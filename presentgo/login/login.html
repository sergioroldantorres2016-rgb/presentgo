<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PRESENT&GO</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <!-- LOGO DENTRO DEL RECUADRO -->
        <h1 class="logo-title">PRESENT&GO</h1>
        <h2 class="subtitulo">Iniciar Sesión</h2>

        <form class="login-form">

            <!-- Usuario -->
            <div class="input-group">
                <label class="label" for="usuario">Usuario</label>
                <input 
                    required 
                    placeholder="Introduce tu usuario"
                    name="usuario"
                    id="usuario"
                    type="text"
                />
            </div>

            <!-- Password -->
            <div class="input-group">
                <label class="label" for="password">Contraseña</label>
                <input 
                    required 
                    placeholder="Introduce tu contraseña"
                    name="password"
                    id="password"
                    type="password"
                />
            </div>

            <div class="forgot-password">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón que lleva a HOME -->
            <button id="btnLogin" class="submit">Entrar</button>

            <div class="signup-link">
                ¿No tienes cuenta? <a href="/registro/registro.html">Regístrate</a>
            </div>

            <div class="admin-link">
                ¿Eres administrador? <a href="/admin-login/admin-login.html">Accede aquí</a>
            </div>

        </form>

    </div>

    <script src="../api.js"></script>
    <script src="login.js"></script>
</body>
</html>
