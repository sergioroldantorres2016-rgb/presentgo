<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - PRESENT&GO</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="container">

        <!-- LOGO -->
        <h1 class="logo-title">PRESENT&GO</h1>

        <!-- SUBTÍTULO -->
        <h2 class="subtitulo">Crear cuenta</h2>

        <!-- CAMPOS -->
        <div class="input-group">
            <input id="nombre" type="text" placeholder="Nombre">
        </div>

        <div class="input-group">
            <input id="apellido" type="text" placeholder="Apellido">
        <div class="input-group">
            <input id="usuario" type="text" placeholder="Nombre de usuario">
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Introduce tu contraseña">
        </div>

        <div class="input-group">
            <input id="password2" type="password" placeholder="Repite la contraseña">
        </div>

        <!-- BOTÓN -->
        <button id="btnCrearCuenta" class="btn">Crear cuenta</button>

    </div>

    <script src="../api.js"></script>
    <script src="registro.js"></script>
</body>
</html>
